name: eden
description: "AI-first requirements platform — expert panel engine + living story map"
schema: eve/compose/v2

x-eve:
  packs:
    - source: ./

registry: "eve"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: ./apps/api/Dockerfile
    ports: [3000]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${managed.db.url}
      CORS_ORIGIN: "https://eden.eh1.incept5.dev,https://web.${ORG_SLUG}-eden-sandbox.eh1.incept5.dev"
      EVE_API_URL: ${secret.EVE_API_URL}
      EVE_PROJECT_ID: ${secret.EVE_PROJECT_ID}
      EVE_SERVICE_TOKEN: ${secret.EVE_SERVICE_TOKEN}

  web:
    build:
      context: ./apps/web
      dockerfile: ./apps/web/Dockerfile
    ports: [80]
    environment:
      API_SERVICE_HOST: ${ENV_NAME}-api
    depends_on:
      api:
        condition: service_healthy
    x-eve:
      ingress:
        public: true
        port: 80
        alias: eden

  migrate:
    image: public.ecr.aws/w7c4v0w3/eve-horizon/migrate:latest
    environment:
      DATABASE_URL: ${managed.db.url}
      MIGRATIONS_DIR: /migrations
    x-eve:
      role: job
      files:
        - source: db/migrations
          target: /migrations

  db:
    x-eve:
      role: managed_db
      managed:
        class: db.p1
        engine: postgres
        engine_version: "16"

environments:
  sandbox:
    pipeline: deploy

workflows:
  question-evolution:
    trigger:
      app:
        event: question.answered
    with_apis:
      - service: api
        description: Eden Story Map API for reading questions/tasks and creating changesets
    steps:
      - name: evolve
        agent:
          name: question-agent
    hints:
      timeout_seconds: 300
      permission_policy: auto_edit

  alignment-check:
    trigger:
      app:
        event: changeset.accepted
    with_apis:
      - service: api
        description: Eden Story Map API for reading map state and creating questions
    steps:
      - name: align
        agent:
          name: alignment
    hints:
      timeout_seconds: 300
      permission_policy: auto_edit

  ingestion-pipeline:
    trigger:
      system:
        event: doc.ingest
    with_apis:
      - service: api
        description: Eden Story Map API for reading map state and creating changesets
    steps:
      - name: ingest
        agent:
          name: ingestion
      - name: extract
        depends_on: [ingest]
        agent:
          name: extraction
      - name: synthesize
        depends_on: [extract]
        agent:
          name: synthesis
    hints:
      timeout_seconds: 900
      permission_policy: auto_edit

pipelines:
  deploy:
    steps:
      - name: build
        action: { type: build }
      - name: release
        depends_on: [build]
        action: { type: release }
      - name: deploy
        depends_on: [release]
        action: { type: deploy }
      - name: migrate
        depends_on: [deploy]
        action:
          type: job
          service: migrate
      - name: smoke-test
        depends_on: [migrate]
        script:
          run: ./scripts/smoke-test.sh
          timeout: 300
      - name: smoke-test-p2
        depends_on: [smoke-test]
        script:
          run: ./scripts/smoke-test-p2.sh
          timeout: 300
