version: 1
agents:
  # Coordinator — triages requests, processes files, dispatches expert panel when needed, synthesizes results
  pm-coordinator:
    slug: pm
    alias: pm
    name: "PM Coordinator"
    description: "PM coordinator — triages requests, processes files, dispatches expert panel when needed, synthesizes results"
    skill: coordinator
    harness_profile: coordinator
    workflow: coordinator
    gateway:
      policy: routable
      clients: [slack]
    policies:
      permission_policy: auto_edit
      git:
        commit: never
        push: never

  # Expert Panel Agents — internal only, invoked by staged council dispatch
  tech-lead:
    slug: tech-lead
    name: "Tech Lead"
    description: "Technical feasibility, architecture, cost, engineering risk"
    skill: tech-lead
    harness_profile: expert
    workflow: assistant
